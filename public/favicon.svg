<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Gradients -->
  <linearGradient id="heartBg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#dc2626" />
    <stop offset="100%" stop-color="#991b1b" />
  </linearGradient>
  
  <linearGradient id="badgeBg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#60a5fa" />
    <stop offset="100%" stop-color="#2563eb" />
  </linearGradient>

  <!-- Main rounded container -->
  <rect x="0" y="0" width="32" height="32" rx="8" fill="url(#heartBg)" />

  <!-- Lucide Heart filled with white, scaled and centered -->
  <g transform="translate(6, 6) scale(0.833)">
    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" 
          fill="#ffffff" />
  </g>

  <!-- Pulse Badge in Top-Right -->
  <circle cx="25" cy="7" r="5.5" fill="url(#badgeBg)" stroke="#ffffff" stroke-width="1.2" />

  <!-- Lucide Activity EKG line inside the blue circle -->
  <g transform="translate(20.8, 2.8) scale(0.35)">
    <path d="M22 12h-4l-3 9L9 3l-3 9H2" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="3" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>
</svg>
